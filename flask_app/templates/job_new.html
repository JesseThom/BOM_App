<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Dahmes BOM</title>

</head>
<body>
  
<nav class="navbar bg-body-tertiary" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" href="#">
      <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
    </a>
    <div>
      <ul class="nav">
        <li class="nav-item">
          <a class="nav-Link" href="/">Home</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
  

<div class="container py-5">
    <h2 class="text-center mb-3">Create Job</h2>
    {% for message in get_flashed_messages(category_filter=['err_job']) %}
      <p class="err-msg text-center">{{message}}</p>
    {% endfor %}

    <form class=" border shadow p-3 mb-5 bg-body-tertiary rounded p-5 mt-5" action="/create_job" method="post">

        <label class="mt-3">Job Number</label>
        <input class="form-control" type="text" name="job_number">
        <label class="mt-3">Customer</label>
        <input class="form-control" type="text" name="customer">

    </select>
    <div class="text-center">
      <button class="btn btn-success mt-3">Create</button>
      <a href="/" class="btn btn-secondary mt-3">Cancel</a>
    </div>
    </form>
</div>

</body>
</html>
