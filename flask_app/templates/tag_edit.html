<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Dahmes BOM</title>

</head>
<body>
  
<nav class="navbar bg-body-tertiary" data-bs-theme="dark">
  <div class="Container d-flex mx-auto">
    <a class="navbar-brand" href="#">
      <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
    </a>
    <div class="my-auto">
      <ul class="nav">
        <li class="nav-item">
          <a class="nav-Link" href="/">Home</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
  

<div class="container py-5">
    <h2 class="text-center mb-3">Edit Tag</h2>
      <form action="/delete_tag/{{tag.job_id}}/{{tag.id}}"
          onsubmit="return confirm('Are you sure you want to delete this item?');">
        <button type="submit" class="btn btn-outline-danger">Delete</button>
      </form>
    <form class=" border shadow p-3 mb-5 bg-body-tertiary rounded p-5 mt-5" action="/update_tag" method="post">

        <input class="form-control" type="text" name="job_id" value="{{tag.job_id}}" hidden>
        <input class="form-control" type="text" name="id" value="{{tag.id}}" hidden>

        <label class="mt-3">Handle</label>
        <input class="form-control" type="text" name="handle" value="{{tag.handle}}">

        <label class="mt-3">Blockname</label>
        <input class="form-control" type="text" name="blockname" value="{{tag.blockname}}">

        <label class="mt-3">Type</label>
        <input class="form-control" type="text" name="type" value="{{tag.type}}">

        <label class="mt-3">Number</label>
        <input class="form-control" type="text" name="tag_number" value="{{tag.tag_number}}">

        <label class="mt-3">Process Description</label>
        <input class="form-control" type="text" name="process_desc" value="{{tag.process_desc}}">

        <label class="mt-3">Option</label>
        <select class="form-select" name="option_id" required>
        <option value="{{tag.option_id}}">{{tag.option_desc}}</option>
        {% for opt in options %}
            <option value="{{ opt.id }}">{{ opt.option_desc }}</option>
        {% endfor %}
        </select>

        <label class="mt-3">Control Panel</label>
        <input class="form-control" type="text" name="control_panel" value="{{tag.control_panel}}">

        <label for="electrical" class="form-label">Electrical</label>
        <select class="form-select" name="electrical">
          <option selected>{{tag.electrical}}</option>
          <option value="None">None</option>
          <option value="Complete">Complete</option>
          <option value="Needs Update">Needs Update</option>
          <option value="N/A">N/A</option>
        </select>

        <label class="mt-3">Notes</label>
        <input class="form-control" type="text" name="notes" value="{{tag.notes}}">

      <div class="text-center">
        <button class="btn btn-success mt-3">Submit Changes</button>
        <a href="/BOM/{{ tag.job_id }}" class="btn btn-secondary mt-3">Cancel</a>
        {% if tag.active == 1%}
          <a href="/remove_tag/{{tag.job_id}}/{{tag.id}}" class="btn btn-danger mt-3">Remove Tag</a>
        {% else %}
          <a href="/reinstate_tag/{{tag.job_id}}/{{tag.id}}" class="btn btn-warning mt-3">Reinstate Tag</a>
        {% endif %}
      </div>
    </form>
</div>

</body>
</html>
