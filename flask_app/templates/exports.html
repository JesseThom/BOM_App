<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Dahmes BOM</title>

</head>

<body>
  <!-- navbar -->
  <nav class="navbar bg-body-tertiary" data-bs-theme="dark">
    <div class="Container d-flex mx-auto">
      <a class="navbar-brand" href="#">
        <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
      </a>
      <div class="my-auto">
        <ul class="nav">
          <li class="nav-item">
            <a class="nav-Link me-3" href="/">Home</a>

            <a class="nav-Link" href="/design/{{job_id}}">Purchasing</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
<div class="container py-5">
<h2 class="fw-bold text-center">Import/Exports</h2>
    <div class="row g-3 mt-2">

        <div class="col-12 col-md-6 col-lg-4">
            <a href="/job/{{ job_id }}/por" class="text-decoration-none">
                <div class="card border-primary shadow-sm job-card">
                    <div class="card-header text-primary">Export (WIP)</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">P.O.R.</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="#" class="text-decoration-none">
                <div class="card border-primary shadow-sm job-card">
                    <div class="card-header text-primary">Export (WIP)</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">Acad Tags</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="#" class="text-decoration-none">
                <div class="card border-primary shadow-sm job-card">
                    <div class="card-header text-primary">Export (WIP)</div>
                    <div class="card-body text-center">

                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="#" class="text-decoration-none">
                <div class="card border-primary shadow-sm job-card">
                    <div class="card-header text-primary">Export (WIP)</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">All Tags</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="/job/{{ job_id }}/electrical" class="text-decoration-none">
                <div class="card border-primary shadow-sm job-card">
                    <div class="card-header text-primary">Export</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">Electrical</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="/job/{{ job_id }}/import_tags" class="text-decoration-none">
                <div class="card border-success shadow-sm job-card">
                    <div class="card-header text-success">Import</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">Acad Tags</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <a href="/tag/{{ job_id }}" class="text-decoration-none">

                    <div class="card-header text-success">Import</div>
                    <div class="card-body text-center">
                        <h4 class="card-title">Single Tag</h4>
                    </div>
                </div>
            </a>
