<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Dahmes BOM</title>

</head>
<body>
  
<nav class="navbar bg-body-tertiary" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" href="#">
      <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
    </a>
    <div>
      <ul class="nav">
        <li class="nav-item">
          <a class="nav-Link" href="/">Home</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
  

<div class="container py-5">
    <h2 class="text-center mb-3">Add Tag</h2>
    {% for message in get_flashed_messages(category_filter=['err_handle']) %}
      <p class="err-msg text-center">{{message}}</p>
    {% endfor %}

    <form class=" border shadow p-3 mb-5 bg-body-tertiary rounded p-5 mt-5" action="/create_tag" method="post">

        <input class="form-control" type="text" name="job_id" value="{{job_id}}" hidden>
        <label class="mt-3">Handle</label>
        <input class="form-control" type="text" name="handle">
        <label class="mt-3">Blockname</label>
        <input class="form-control" type="text" name="blockname">
        <label class="mt-3">Type</label>
        <input class="form-control" type="text" name="type">
        <label class="mt-3">Number</label>
        <input class="form-control" type="text" name="tag_number">
        <label class="mt-3">Process Description</label>
        <input class="form-control" type="text" name="process_desc">
        <label class="mt-3">Option</label>
        <select class="form-select" name="option_id" required>
        <option value="" disabled selected>Option</option>
        {% for opt in options %}
            <option value="{{ opt.id }}">{{ opt.option_desc }}</option>
        {% endfor %}
    </select>
    <div class="text-center">
      <button class="btn btn-success mt-3">Create</button>
      <a href="/job/{{ job_id }}/exports" class="btn btn-secondary mt-3">Cancel</a>
    </div>
<!-- <div class="d-flex">
  <button class="btn btn-secondary d-block mx-auto mt-3">Create</button>
  <a href="/controls/{{ job_id }}" class="btn btn-warning mt-3 d-block">Cancel</a>
</div> -->
    </form>
</div>

</body>
</html>
