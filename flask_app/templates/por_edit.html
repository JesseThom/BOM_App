<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Dahmes BOM</title>

</head>

<body>
  <!-- navbar -->
  <nav class="navbar bg-body-tertiary" data-bs-theme="dark">
    <div class="Container d-flex mx-auto">
      <a class="navbar-brand" href="#">
        <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
      </a>
      <div class="my-auto">
        <ul class="nav">
          <li class="nav-item">
            <a class="nav-Link me-3" href="/">Home</a>
            <a class="nav-Link me-3" href="/BOM/{{job.id}}">Main</a>
            <a class="nav-Link-active me-3" href="/controls/{{job.id}}">Controls</a>
            <a class="nav-Link me-3" href="/process/{{job.id}}">Process</a>
            <a class="nav-Link" href="/design/{{job.id}}">Purchasing</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

<div class="w-25 mx-auto mt-4">

  <h3>POR Export</h3>
  <form class=" border shadow p-3 mb-5 bg-body-tertiary rounded p-5 mt-5" action="" method="post">

    <label class="mt-3">POR Number</label>
    <input class="form-control" type="text" name="por_number">

    <label for="vendor" class="form-label">Vendor</label>
    <select class="form-select" name="vendor">
      <option selected></option>
      <option value="SMC">SMC</option>
      <option value="IFM" disabled>IFM</option>
      <option value="Dywer" disabled>Dywer</option>
      <option value="DSI" disabled>DSI</option>
    </select>
    <div class="text-center">
      <button class="btn btn-success mt-3">Generate POR</button>
    </div>
  </form>
</div>

<table class="table table-bordered table-striped table-hover">
      <thead class="table-secondary">
        <tr>
          <th>Check</th>
          <th>Qty</th>
          <th>Full Tag</th>
          <th>Model Description</th>
          <th>MFG P/N</th>
          <th>Manufacturer</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>

</body>
<script src="\static\js\script.js"></script>

</html>
