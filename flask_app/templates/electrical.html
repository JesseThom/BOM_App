<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Dahmes BOM</title>

</head>

<body>
  <!-- navbar -->
  <nav class="navbar bg-body-tertiary" data-bs-theme="dark">
    <div class="Container d-flex mx-auto">
      <a class="navbar-brand" href="#">
        <img src="/static/imgs/dahmes.png" alt="dahmes" height="70">
      </a>
      <div class="my-auto">
        <ul class="nav">
          <li class="nav-item">
            <a class="nav-Link me-3" href="/">Home</a>
            <a class="nav-Link me-3" href="/BOM/{{job.id}}">Main</a>
            <a class="nav-Link-active me-3" href="/controls/{{job.id}}">Controls</a>
            <a class="nav-Link me-3" href="/process/{{job.id}}">Process</a>
            <a class="nav-Link" href="/design/{{job.id}}">Purchasing</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

    <div class="container mt-4">

    <h3>Export Tags - Job {{ job.job_number }}</h3>

    <form method="POST" action="/job/{{ job.id }}/export">

        <!-- Control Panel -->
        <label class="mt-3 fw-bold">Control Panel</label>
        <input type="text" name="control_panel" class="form-control" placeholder="Example: CP-11">

        <!-- A_I Filter -->
        <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" name="io" value="a_i">
        <label class="form-check-label">Analog IN</label>
        </div>
        <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" name="io" value="d_i">
        <label class="form-check-label">Digital IN</label>
        </div>

        <button class="btn btn-success mt-4">Download CSV</button>
        <a href="/job/{{ job.id }}/exports" class="btn btn-secondary mt-4">Cancel</a>

    </form>

    </div>

</body>
<script src="\static\js\script.js"></script>

</html>
